<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Last Colony Google Play Feature Graphic</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #050913;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 1024px;
        height: 500px;
        overflow: hidden;
        background:
          radial-gradient(circle at 78% 24%, rgba(56, 213, 255, 0.35), transparent 24%),
          radial-gradient(circle at 20% 18%, rgba(139, 92, 246, 0.34), transparent 28%),
          linear-gradient(135deg, #050913 0%, #08111f 48%, #120b22 100%);
      }

      .frame {
        position: relative;
        width: 1024px;
        height: 500px;
        padding: 58px 64px;
        overflow: hidden;
      }

      .stars,
      .grid,
      .horizon,
      .rings {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .stars {
        opacity: 0.55;
        background-image:
          radial-gradient(circle, rgba(255, 255, 255, 0.9) 0 1px, transparent 1.5px),
          radial-gradient(circle, rgba(56, 213, 255, 0.75) 0 1px, transparent 1.6px);
        background-position:
          34px 20px,
          12px 56px;
        background-size:
          82px 72px,
          132px 118px;
      }

      .grid {
        top: auto;
        height: 210px;
        background:
          linear-gradient(rgba(56, 213, 255, 0.2) 1px, transparent 1px),
          linear-gradient(90deg, rgba(56, 213, 255, 0.17) 1px, transparent 1px);
        background-size: 44px 34px;
        transform: perspective(560px) rotateX(62deg) translateY(74px);
        transform-origin: bottom;
        opacity: 0.38;
        mask-image: linear-gradient(to top, black 12%, transparent 92%);
      }

      .horizon {
        top: auto;
        height: 112px;
        background:
          linear-gradient(90deg, transparent, rgba(56, 213, 255, 0.7), transparent),
          linear-gradient(180deg, transparent, rgba(5, 9, 19, 0.92));
        opacity: 0.78;
      }

      .rings {
        left: auto;
        width: 430px;
        border: 1px solid rgba(56, 213, 255, 0.24);
        border-radius: 999px;
        transform: translate(104px, -92px) rotate(-18deg);
        box-shadow:
          0 0 0 42px rgba(56, 213, 255, 0.035),
          0 0 0 92px rgba(139, 92, 246, 0.03),
          0 0 120px rgba(56, 213, 255, 0.28);
      }

      .content {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 1fr 300px;
        align-items: center;
        height: 100%;
        gap: 48px;
      }

      .eyebrow {
        display: inline-flex;
        width: fit-content;
        gap: 10px;
        align-items: center;
        padding: 9px 14px;
        border: 1px solid rgba(56, 213, 255, 0.38);
        border-radius: 999px;
        color: #8eeaff;
        background: rgba(6, 18, 34, 0.62);
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.17em;
        text-transform: uppercase;
      }

      h1 {
        margin: 22px 0 0;
        color: #f8fbff;
        font-size: 76px;
        line-height: 0.93;
        letter-spacing: -0.06em;
        text-shadow: 0 0 42px rgba(56, 213, 255, 0.3);
      }

      h1 span {
        display: block;
        color: #38d5ff;
      }

      p {
        max-width: 580px;
        margin: 22px 0 0;
        color: rgba(235, 247, 255, 0.82);
        font-size: 25px;
        line-height: 1.22;
        font-weight: 650;
      }

      .chips {
        display: flex;
        gap: 12px;
        margin-top: 30px;
      }

      .chip {
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 16px;
        padding: 12px 15px;
        color: #eaf8ff;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
        font-size: 17px;
        font-weight: 800;
      }

      .badge {
        position: relative;
        width: 262px;
        height: 262px;
        justify-self: end;
        border-radius: 64px;
        display: grid;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(56, 213, 255, 0.2), rgba(139, 92, 246, 0.18)),
          rgba(2, 6, 23, 0.76);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow:
          0 34px 90px rgba(0, 0, 0, 0.45),
          0 0 68px rgba(56, 213, 255, 0.24);
        overflow: hidden;
      }

      .badge::before {
        content: "";
        position: absolute;
        inset: -2px;
        background:
          linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.22), transparent);
        transform: translateX(-62%) rotate(18deg);
      }

      .badge img {
        position: relative;
        width: 205px;
        height: 205px;
        border-radius: 46px;
        object-fit: cover;
        filter: drop-shadow(0 16px 34px rgba(0, 0, 0, 0.45));
      }
    </style>
  </head>
  <body>
    <main class="frame" aria-label="Last Colony Decisions feature graphic">
      <div class="stars"></div>
      <div class="rings"></div>
      <div class="grid"></div>
      <div class="horizon"></div>
      <section class="content">
        <div>
          <div class="eyebrow">Offline sci-fi strategy</div>
          <h1>LAST COLONY <span>DECISIONS</span></h1>
          <p>Lead humanity’s final colony through hard choices, fragile resources and escalating crisis cards.</p>
          <div class="chips" aria-hidden="true">
            <div class="chip">260 cards</div>
            <div class="chip">No account</div>
            <div class="chip">Offline play</div>
          </div>
        </div>
        <div class="badge">
          <img src="./last-colony-icon.png" alt="" />
        </div>
      </section>
    </main>
  </body>
</html>
